<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SprintDesk</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">⚡ SprintDesk</div>
    <nav>
      <a href="#" class="nav-link active" onclick="showPage('projects')">📁 Projects</a>
      <a href="#" class="nav-link" onclick="showPage('digest')">📊 Daily Digest</a>
    </nav>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- PROJECTS PAGE -->
    <div id="page-projects">
      <div class="page-header">
        <h1>Projects</h1>
        <button class="btn btn-primary" onclick="openModal('modal-new-project')">+ New Project</button>
      </div>
      <div id="projects-list" class="cards-grid"></div>
    </div>

    <!-- STORIES PAGE -->
    <div id="page-stories" style="display:none">
      <div class="page-header">
        <button class="btn btn-back" onclick="showPage('projects')">← Back</button>
        <h1 id="stories-project-title">Stories</h1>
        <button class="btn btn-primary" onclick="openModal('modal-new-story')">+ New Story</button>
      </div>
      <div id="stories-list" class="stories-container"></div>
    </div>

    <!-- DIGEST PAGE -->
    <div id="page-digest" style="display:none">
      <div class="page-header"><h1>📊 Daily Digest</h1></div>
      <div id="digest-list"></div>
    </div>

  </div>

  <!-- MODAL: New Project -->
  <div id="modal-new-project" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>New Project</h2>
      <input id="new-project-name" class="input" placeholder="Project name *" />
      <textarea id="new-project-desc" class="input" placeholder="Description (optional)" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('modal-new-project')">Cancel</button>
        <button class="btn btn-primary" onclick="createProject()">Create</button>
      </div>
    </div>
  </div>

  <!-- MODAL: New Story -->
  <div id="modal-new-story" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>New User Story</h2>
      <input id="new-story-title" class="input" placeholder="Story title *" />
      <textarea id="new-story-desc" class="input" placeholder="Description (optional)" rows="3"></textarea>
      <select id="new-story-priority" class="input">
        <option value="low">Low Priority</option>
        <option value="medium" selected>Medium Priority</option>
        <option value="high">High Priority</option>
      </select>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('modal-new-story')">Cancel</button>
        <button class="btn btn-primary" onclick="createStory()">Create</button>
      </div>
    </div>
  </div>

  <!-- MODAL: New Task -->
  <div id="modal-new-task" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>New Task</h2>
      <input id="new-task-title" class="input" placeholder="Task title *" />
      <input id="new-task-assignee" class="input" placeholder="Assignee (optional)" />
      <input id="new-task-due" class="input" type="date" />
      <div class="modal-actions">
        <button class="btn" onclick="closeModal('modal-new-task')">Cancel</button>
        <button class="btn btn-primary" onclick="createTask()">Create</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
